name: Deployment
run-name: ${{github.actor}} - ${{github.ref_name}}

on:
  workflow_call:
    inputs:
      environment:
        required: true
        description: 'Environment to deploy to'
        type: string
    secrets:
      DOCKERHUB_USERNAME:
        required: true

jobs:
  deploy:
    name: ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Helm Package
        uses: actions/download-artifact@v4
        with:
          name: helm-package
          path: .

      - name: Create Kind Cluster
        uses: helm/kind-action@v1.10.0
        with:
          config: cluster.yml

      - name: Set Up Helm
        uses: azure/setup-helm@v4.2.0

      - name: Helm Dry Run
        run: |
          helm install todoapp ./todoapp-*.tgz \
            --dry-run --debug \
            --set todoapp.image.repository=${{ secrets.DOCKERHUB_USERNAME }}/todoapp \
            --set todoapp.image.tag=${{ github.sha }}

      - name: Helm Upgrade
        run: |
          helm upgrade --install --atomic --wait --timeout 3600s --debug ${{inputs.helm-release-name}} ./todoapp-*.tgz \
          -f ${{ inputs.helm-values-path }} \
          --set mysql.configs.MYSQL_ROOT_PASSWORD="${{ secrets.MYSQL_ROOT_PASSWORD}}" \
          --set mysql.configs.MYSQL_USER="${{ secrets.MYSQL_USER }}" \
          --set mysql.configs.MYSQL_PASSWORD="${{ secrets.MYSQL_PASSWORD }}" \
          --set todoapp.secret.password="${{ secrets.TODOAPP_PASSWORD }}" \
          --set todoapp.secret.login="${{ secrets.TODOAPP_LOGIN }}" \
          --set todoapp.secret.DB_CONNECTION="${{ secrets.DB_CONNECTION }}" \
          --set todoapp.image.version=${{ github.sha }}